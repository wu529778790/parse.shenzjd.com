name: Test, build and deploy

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/deploy-to-docker.yaml"
      - "src/**"
      - "**/*.ts"
      - "**/*.tsx"
      - "public/**"
      - "next.config.*"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            CONTAINER="${{ github.event.repository.name }}"
            ENV_FILE="/opt/1panel/apps/openresty/openresty/www/sites/shenzjd.com/index/.env"
            sudo docker pull "$IMAGE"
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true
            ENV_FLAGS=""
            if [ -f "$ENV_FILE" ]; then
              ENV_FLAGS="--env-file $ENV_FILE"
            fi
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              $ENV_FLAGS \
              -p 6669:3000 \
              "$IMAGE"
            sudo docker image prune -f
