name: Test, build and deploy

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/deploy-to-docker.yaml"
      - "src/**"
      - "**/*.ts"
      - "**/*.tsx"
      - "public/**"
      - "next.config.*"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/deploy-to-docker.yaml"
      - "src/**"
      - "**/*.ts"
      - "**/*.tsx"
      - "public/**"
      - "next.config.*"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker daemon with mirror
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors":["https://docker.1ms.run"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || sudo service docker restart

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          # 传入 git sha 作为稳定 buildId，避免滚动部署前后端 build 不一致
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

